{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 85vh;">
    <div class="col-md-6 col-lg-4">
        <div class="auth-card glass-card p-5">
            <div class="text-center">
                <div class="auth-icon">
                    <i class="bi bi-shield-lock-fill fs-1 text-accent"></i>
                </div>
                <h2 class="fw-800 text-gradient mb-2">Secure Access</h2>
                <p class="text-muted mb-4">Enter your credentials to access CyberShield</p>
            </div>
            
            <form method="POST" action="{{ url_for('auth.login') }}" class="mt-2">
                <div class="mb-4">
                    <label for="email" class="form-label small fw-700 tracking-wider text-muted-50 uppercase">
                        Email Address
                    </label>
                    <div class="input-group">
                        <span class="input-group-text glass-input-addon">
                            <i class="bi bi-person-fill text-accent"></i>
                        </span>
                        <input type="email" class="form-control glass-input" id="email" name="email"
                               value="{{ email|default('') }}" required
                               placeholder="admin@cybershield.com" autocomplete="email">
                    </div>
                </div>
                
                <div class="mb-4">
                    <label for="password" class="form-label small fw-700 tracking-wider text-muted-50 uppercase">
                        Access Key
                    </label>
                    <div class="input-group">
                        <span class="input-group-text glass-input-addon">
                            <i class="bi bi-key-fill text-accent"></i>
                        </span>
                        <input type="password" class="form-control glass-input" id="password" name="password"
                               required placeholder="••••••••" autocomplete="current-password">
                        <button class="btn glass-input border-start-0" type="button" onclick="togglePassword('password')">
                            <i class="bi bi-eye text-muted" id="password-eye"></i>
                        </button>
                    </div>
                </div>
                
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div class="form-check">
                        <input type="checkbox" class="form-check-input" id="remember" name="remember">
                        <label class="form-check-label small text-muted" for="remember">Keep me logged in</label>
                    </div>
                    <a href="{{ url_for('auth.forgot_password') }}" class="small text-accent text-decoration-none hover-white transition-all">Recover Password</a>
                </div>
                
                <button type="submit" class="btn btn-accent w-100 py-3 fw-700 mb-4 animate-glow">
                    <i class="bi bi-shield-shaded me-2"></i>Authenticate
                </button>
            </form>
            
            <div class="text-center border-top border-glass pt-4 mt-2">
                <p class="text-muted mb-0 small">
                    Unauthorized access is strictly prohibited.
                </p>
                <p class="mt-2 small">
                    Need an account? <a href="{{ url_for('auth.signup') }}" class="text-accent text-decoration-none fw-700">Request Access</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
