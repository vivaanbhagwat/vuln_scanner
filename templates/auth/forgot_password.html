{% extends "base.html" %}
{% block title %}Forgot Password{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-5 col-lg-4">
        <div class="glass-card p-5 auth-card">
            <div class="text-center mb-4">
                <div class="auth-icon mb-3">
                    <i class="bi bi-shield-lock-fill fs-1 text-accent animate-pulse"></i>
                </div>
                <h2 class="fw-800">Secure Recovery</h2>
                <p class="text-muted">Enter your registered email address to receive a secure password reset link.</p>
            </div>
            
            <form method="POST" action="{{ url_for('auth.forgot_password') }}" class="recovery-form">
                <div class="mb-4">
                    <label for="email" class="form-label small fw-700 text-uppercase tracking-wider">
                        <i class="bi bi-envelope-at me-1"></i>Email Address
                    </label>
                    <input type="email" class="form-control glass-input py-2" id="email" name="email"
                           required placeholder="your@email.com" autocomplete="email">
                </div>
                
                <button type="submit" class="btn btn-accent w-100 py-3 fw-700 mb-4 shadow-accent">
                    <i class="bi bi-lightning-charge-fill me-2"></i>Send Recovery Link
                </button>
                
                <div class="text-center pt-2">
                    <a href="{{ url_for('auth.login') }}" class="text-white-50 text-decoration-none small hover-white transition-all">
                        <i class="bi bi-chevron-left small me-1"></i>Return to Login
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
