{% extends "base.html" %}
{% block title %}Reset Password{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-5 col-lg-4">
        <div class="glass-card p-5 auth-card">
            <div class="text-center mb-4">
                <div class="auth-icon mb-3">
                    <i class="bi bi-shield-lock-fill fs-1 text-accent animate-pulse"></i>
                </div>
                <h2 class="fw-800">Set New Password</h2>
                <p class="text-muted">Generate a secure credential to regain access.</p>
            </div>
            
            <form method="POST" action="{{ url_for('auth.reset_password', token=token) }}" class="reset-form">
                <div class="mb-3">
                    <label for="password" class="form-label small fw-700 text-uppercase tracking-wider">
                        <i class="bi bi-lock me-1"></i>New Password
                    </label>
                    <input type="password" class="form-control glass-input py-2" id="password" name="password"
                           required placeholder="Min 8 chars, uppercase, digit, special">
                    <div class="form-text mt-2 small text-muted-50">
                        Must contain at least 8 characters, one number, and one special character.
                    </div>
                </div>
                
                <div class="mb-4">
                    <label for="confirm_password" class="form-label small fw-700 text-uppercase tracking-wider">
                        <i class="bi bi-check2-circle me-1"></i>Repeat Password
                    </label>
                    <input type="password" class="form-control glass-input py-2" id="confirm_password" name="confirm_password"
                           required placeholder="Verify your new password">
                </div>
                
                <button type="submit" class="btn btn-accent w-100 py-3 fw-700 shadow-accent">
                    <i class="bi bi-pencil-square me-2"></i>Update Password
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
