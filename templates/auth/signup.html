{% extends "base.html" %}
{% block title %}Sign Up{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 85vh;">
    <div class="col-md-6 col-lg-5">
        <div class="auth-card glass-card p-5">
            <div class="text-center">
                <div class="auth-icon">
                    <i class="bi bi-person-plus-fill fs-1 text-accent"></i>
                </div>
                <h2 class="fw-800 text-gradient mb-2">Create Account</h2>
                <p class="text-muted mb-4">Join the CyberShield security network</p>
            </div>
            
            <form method="POST" action="{{ url_for('auth.signup') }}" id="signupForm" class="mt-2">
                <div class="row">
                    <div class="col-md-6 mb-4">
                        <label for="username" class="form-label small fw-700 tracking-wider text-muted-50 uppercase">
                            Username
                        </label>
                        <div class="input-group">
                            <span class="input-group-text glass-input-addon">
                                <i class="bi bi-person text-accent"></i>
                            </span>
                            <input type="text" class="form-control glass-input" id="username" name="username" 
                                   value="{{ username|default('') }}" required minlength="3" 
                                   placeholder="cybershield_user" autocomplete="username">
                        </div>
                    </div>
                    <div class="col-md-6 mb-4">
                        <label for="email" class="form-label small fw-700 tracking-wider text-muted-50 uppercase">
                            Email
                        </label>
                        <div class="input-group">
                            <span class="input-group-text glass-input-addon">
                                <i class="bi bi-envelope text-accent"></i>
                            </span>
                            <input type="email" class="form-control glass-input" id="email" name="email"
                                   value="{{ email|default('') }}" required
                                   placeholder="user@gate.com" autocomplete="email">
                        </div>
                    </div>
                </div>
                
                <div class="mb-4">
                    <label for="password" class="form-label small fw-700 tracking-wider text-muted-50 uppercase">
                        Security Phrase (Password)
                    </label>
                    <div class="input-group">
                        <span class="input-group-text glass-input-addon">
                            <i class="bi bi-lock-fill text-accent"></i>
                        </span>
                        <input type="password" class="form-control glass-input" id="password" name="password"
                               required minlength="8" placeholder="••••••••" autocomplete="new-password">
                        <button class="btn glass-input border-start-0" type="button" onclick="togglePassword('password')">
                            <i class="bi bi-eye text-muted" id="password-eye"></i>
                        </button>
                    </div>
                    <div class="password-strength mt-2" id="passwordStrength"></div>
                </div>
                
                <div class="mb-4">
                    <label for="confirm_password" class="form-label small fw-700 tracking-wider text-muted-50 uppercase">
                        Confirm Security Phrase
                    </label>
                    <div class="input-group">
                        <span class="input-group-text glass-input-addon">
                            <i class="bi bi-shield-lock text-accent"></i>
                        </span>
                        <input type="password" class="form-control glass-input" id="confirm_password" 
                               name="confirm_password" required placeholder="••••••••" autocomplete="new-password">
                    </div>
                </div>
                
                <button type="submit" class="btn btn-accent w-100 py-3 fw-700 mb-4 animate-glow">
                    <i class="bi bi-shield-check me-2"></i>Initialize Account
                </button>
            </form>
            
            <div class="text-center border-top border-glass pt-4 mt-2">
                <p class="text-muted mb-0 small">
                    Already operational? <a href="{{ url_for('auth.login') }}" class="text-accent text-decoration-none fw-700">Access Console</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
