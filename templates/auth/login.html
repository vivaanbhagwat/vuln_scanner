{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-5 col-lg-4">
        <div class="glass-card p-5 auth-card">
            <div class="text-center mb-4">
                <div class="auth-icon mb-3">
                    <i class="bi bi-shield-lock-fill fs-1 text-accent"></i>
                </div>
                <h2 class="fw-700">Welcome Back</h2>
                <p class="text-muted">Sign in to your CyberShield account</p>
            </div>
            
            <form method="POST" action="{{ url_for('auth.login') }}">
                <div class="mb-3">
                    <label for="email" class="form-label small fw-600">
                        <i class="bi bi-envelope me-1"></i>Email
                    </label>
                    <input type="email" class="form-control glass-input" id="email" name="email"
                           value="{{ email|default('') }}" required
                           placeholder="your@email.com" autocomplete="email">
                </div>
                
                <div class="mb-3">
                    <label for="password" class="form-label small fw-600">
                        <i class="bi bi-lock me-1"></i>Password
                    </label>
                    <div class="input-group">
                        <input type="password" class="form-control glass-input" id="password" name="password"
                               required placeholder="Enter password" autocomplete="current-password">
                        <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('password')">
                            <i class="bi bi-eye" id="password-eye"></i>
                        </button>
                    </div>
                </div>
                
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div class="form-check">
                        <input type="checkbox" class="form-check-input" id="remember" name="remember">
                        <label class="form-check-label small" for="remember">Remember me</label>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-accent w-100 py-2 fw-600">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
                </button>
            </form>
            
            <p class="text-center text-muted mt-4 mb-0 small">
                Don't have an account? 
                <a href="{{ url_for('auth.signup') }}" class="text-accent text-decoration-none fw-600">Sign Up</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
